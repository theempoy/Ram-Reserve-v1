<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ramreserve</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <nav class="navbar admin-nav">
            <div class="nav-container">
                <div class="nav-brand">
                    <div class="logo">🎫</div>
                    <span>Ramreserve</span>
                    <span class="badge">Admin</span>
                </div>
                <div class="nav-links">
                    <a href="admin.html" class="active">📊 Dashboard</a>
                    <a href="about.html">👥 About</a>
                    <a href="settings.html">⚙️ Settings</a>
                    <button class="btn btn-outline-light" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h1 class="gradient-text-red">Admin Dashboard</h1>
                <p>Manage reservation requests and track ticket status</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card pending-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <div class="stat-label">Pending Tickets</div>
                        <div class="stat-value" id="pendingCount">0</div>
                        <div class="stat-description">Awaiting review</div>
                    </div>
                </div>
                <div class="stat-card approved-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <div class="stat-label">Approved Tickets</div>
                        <div class="stat-value" id="approvedCount">0</div>
                        <div class="stat-description">Confirmed reservations</div>
                    </div>
                </div>
                <div class="stat-card denied-card">
                    <div class="stat-icon">❌</div>
                    <div class="stat-info">
                        <div class="stat-label">Denied Tickets</div>
                        <div class="stat-value" id="deniedCount">0</div>
                        <div class="stat-description">Rejected requests</div>
                    </div>
                </div>
            </div>

            <div class="section-header">
                <h2 class="gradient-text-red">All Tickets</h2>
            </div>

            <div id="adminTicketsList"></div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/admin.js"></script>
    <script>checkAuth('admin'); loadAdminTickets();</script>
</body>
</html>
