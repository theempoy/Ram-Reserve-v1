<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ramreserve</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-background" style="background-image: url('images/background.png')">
        <div class="login-overlay" id="loginOverlay"></div>
        <div class="login-container">
            <div class="login-header">
                <div class="logo-icon" id="logoIcon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h8"/>
                    </svg>
                </div>
                <h1>Ramreserve</h1>
                <p>Reservation Management System</p>
            </div>

            <div class="login-card">
                <div class="card-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue to your account</p>
                </div>

                <div class="tabs">
                    <button class="tab-button active" data-tab="user" onclick="switchTab('user')">
                        👤 User
                    </button>
                    <button class="tab-button" data-tab="admin" onclick="switchTab('admin')">
                        🛡️ Admin
                    </button>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="your.email@example.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="Enter your password">
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">Sign In as User</button>
                    <button type="button" class="btn btn-outline" onclick="fillDemo()">Fill Demo Credentials</button>
                </form>

                <div class="demo-credentials" id="demoCredentials">
                    <p><strong>Demo User Credentials:</strong></p>
                    <p>Email: user@ramreserve.com</p>
                    <p>Password: user123</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
