<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Calendar - Ramreserve</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <nav class="navbar user-nav">
            <div class="nav-container">
                <div class="nav-brand">
                    <div class="logo">🎫</div>
                    <span>Ramreserve</span>
                </div>
                <div class="nav-links">
                    <a href="home.html">🏠 Home</a>
                    <a href="submit.html">➕ Submit Ticket</a>
                    <a href="my-tickets.html">🎫 My Tickets</a>
                    <a href="room-calendar.html" class="active">📅 Room Calendar</a>
                    <a href="about.html">👥 About</a>
                    <a href="settings.html">⚙️ Settings</a>
                    <button class="btn btn-outline-light" onclick="logout()">🚪 Logout</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h1 class="gradient-text">Room Availability Calendar</h1>
                <p>Check which BMO rooms are available for reservation</p>
            </div>

            <div class="room-selector">
                <button class="room-btn active" onclick="selectRoom('204')">🚪 Room 204</button>
                <button class="room-btn" onclick="selectRoom('310')">🚪 Room 310</button>
                <button class="room-btn" onclick="selectRoom('412')">🚪 Room 412</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="gradient-text-pink">Room <span id="selectedRoom">204</span> - Reservation Schedule</h2>
                    <p>Next 14 days availability</p>
                </div>
                <div id="calendarGrid" class="calendar-grid"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="gradient-text-pink">Room <span id="selectedRoomReservations">204</span> - Upcoming Reservations</h2>
                    <p>Approved reservations for this room</p>
                </div>
                <div id="reservationsList"></div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/calendar.js"></script>
    <script>checkAuth(); loadCalendar();</script>
</body>
</html>
